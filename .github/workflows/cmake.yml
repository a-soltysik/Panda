name: CMake
'on':
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
env:
  BUILD_TYPE: Release
jobs:
  build-windows:
    strategy:
      matrix:
        compiler:
          - gcc
          - clang
          - msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.1.1
        with:
          version: latest
          cache: true
      - if: ${{matrix.compiler}} == msvc
        name: Configure CMake
        env:
          CMAKE_C_COMPILER: '${{matrix.compiler}}'
          CMAKE_CXX_COMPILER: '${{matrix.compiler}}'
        run: >-
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      - if: ${{matrix.compiler}} != msvc
        name: Configure CMake Static Analysis
        env:
          CMAKE_C_COMPILER: '${{matrix.compiler}}'
          CMAKE_CXX_COMPILER: '${{matrix.compiler}}'
        run: >-
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DPD_WARNINGS_AS_ERRORS=ON
          -DPD_ENABLE_CPPCHECK=ON
      - name: Build
        run: 'cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}'
  build-linux:
    strategy:
      matrix:
        compiler:
          - gcc
          - clang
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.1.1
        with:
          version: latest
          cache: true
      - name: Install X11
        run: sudo apt install xorg-dev
      - name: Configure CMake Static Analysis
        env:
          CMAKE_C_COMPILER: '${{matrix.compiler}}'
          CMAKE_CXX_COMPILER: '${{matrix.compiler}}'
        run: >-
          echo "${{matrix.compiler}}";
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DPD_WARNINGS_AS_ERRORS=ON
          -DPD_ENABLE_CPPCHECK=ON
          
      - name: Build
        run: 'cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}'
